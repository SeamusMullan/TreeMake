<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="cmRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E03030"/>
      <stop offset="100%" stop-color="#C42020"/>
    </linearGradient>
    <linearGradient id="cmBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1878C8"/>
      <stop offset="100%" stop-color="#06508C"/>
    </linearGradient>
    <linearGradient id="cmGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CB830"/>
      <stop offset="100%" stop-color="#2E8A1E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1A1A24"/>

  <!-- Branches - straight angular lines -->
  <g stroke-width="4" fill="none" stroke-linecap="square">
    <!-- Root to mid-nodes: vertical then horizontal -->
    <polyline points="256,186 256,248 152,248 152,276" stroke="#1878C8" opacity="0.55"/>
    <polyline points="256,186 256,248 360,248 360,276" stroke="#1878C8" opacity="0.55"/>
    <!-- Mid to leaves -->
    <polyline points="152,316 152,362 108,362 108,388" stroke="#C42020" opacity="0.50"/>
    <polyline points="152,316 152,362 196,362 196,388" stroke="#2E8A1E" opacity="0.50"/>
    <polyline points="360,316 360,362 316,362 316,388" stroke="#2E8A1E" opacity="0.50"/>
    <polyline points="360,316 360,362 404,362 404,388" stroke="#C42020" opacity="0.50"/>
  </g>

  <!-- Root node -->
  <rect x="232" y="144" width="48" height="42" rx="6" fill="url(#cmBlue)"/>

  <!-- Mid nodes -->
  <rect x="128" y="276" width="48" height="40" rx="6" fill="url(#cmRed)"/>
  <rect x="336" y="276" width="48" height="40" rx="6" fill="url(#cmGreen)"/>

  <!-- Leaf nodes -->
  <rect x="88"  y="388" width="40" height="36" rx="5" fill="url(#cmRed)"/>
  <rect x="176" y="388" width="40" height="36" rx="5" fill="url(#cmGreen)"/>
  <rect x="296" y="388" width="40" height="36" rx="5" fill="url(#cmBlue)"/>
  <rect x="384" y="388" width="40" height="36" rx="5" fill="url(#cmRed)"/>
</svg>
